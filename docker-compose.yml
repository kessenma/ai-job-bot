services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        NODE_ENV: production
    env_file:
      - ./.env
    environment:
      PORT: 3000
      HOST: "0.0.0.0"
      NODE_ENV: production
      DATA_DIR: /app/data
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite DB, uploads, OAuth tokens across restarts
      - app-data:/app/data
    restart: unless-stopped

  # Future: on-prem LLM for cover letter generation
  # llm:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - llm-models:/root/.ollama

volumes:
  app-data:
